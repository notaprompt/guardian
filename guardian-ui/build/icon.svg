<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Stipple texture filter for ink effect -->
    <filter id="stipple" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.8" numOctaves="4" seed="7" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feComponentTransfer in="gray" result="thresh">
        <feFuncA type="discrete" tableValues="0 0 0 0 0 0 1 1"/>
      </feComponentTransfer>
      <feComposite operator="in" in="SourceGraphic" in2="thresh"/>
    </filter>

    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#E8DCC8" flood-opacity="0.12"/>
    </filter>

    <!-- Inner glow for depth -->
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="0"/>
      <feFlood flood-color="#E8DCC8" flood-opacity="0.08"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>

    <!-- Radial gradient for background depth -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0C0C0C"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>

    <!-- Gold gradient for fills -->
    <linearGradient id="goldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8DCC8" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#E8DCC8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#E8DCC8" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Stroke gradient for the G-shield hybrid -->
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8DCC8" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#F2E6D0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E8DCC8" stop-opacity="0.85"/>
    </linearGradient>

    <!-- Subtle gradient for outer ring -->
    <linearGradient id="outerStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8DCC8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#E8DCC8" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Stipple fill pattern -->
    <pattern id="stipplePattern" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.4" fill="#E8DCC8" opacity="0.15"/>
      <circle cx="3" cy="3" r="0.3" fill="#E8DCC8" opacity="0.10"/>
    </pattern>

    <!-- Outer shield/diamond clip -->
    <clipPath id="outerClip">
      <path d="M256,42 L448,256 L256,470 L64,256 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Stipple texture overlay on background -->
  <rect width="512" height="512" fill="url(#stipplePattern)" opacity="0.4"/>

  <!-- ═══════════════════════════════════════════════
       LAYER 1: OUTER DIAMOND — The Guardian perimeter
       Largest recursive containment form.
       ═══════════════════════════════════════════════ -->

  <!-- Outer diamond fill with subtle gradient -->
  <path d="M256,52 L442,256 L256,460 L70,256 Z"
        fill="url(#goldFill)"
        filter="url(#shadow)"/>

  <!-- Outer diamond stroke — bold, brutalist -->
  <path d="M256,52 L442,256 L256,460 L70,256 Z"
        fill="none"
        stroke="url(#strokeGrad)"
        stroke-width="3"
        stroke-linejoin="miter"/>

  <!-- Corner accent marks — MCM brutalist detail -->
  <line x1="256" y1="52" x2="256" y2="72" stroke="#E8DCC8" stroke-width="1.5" opacity="0.5"/>
  <line x1="442" y1="256" x2="422" y2="256" stroke="#E8DCC8" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="460" x2="256" y2="440" stroke="#E8DCC8" stroke-width="1.5" opacity="0.5"/>
  <line x1="70" y1="256" x2="90" y2="256" stroke="#E8DCC8" stroke-width="1.5" opacity="0.5"/>

  <!-- ═══════════════════════════════════════════════
       LAYER 2: MIDDLE SHIELD — The G-form
       Rotated 45deg implied. Shield shape that reads
       as a G when the negative space is considered.
       ═══════════════════════════════════════════════ -->

  <!-- Middle shield diamond -->
  <path d="M256,112 L388,256 L256,400 L124,256 Z"
        fill="url(#goldFill)"
        opacity="0.8"/>

  <path d="M256,112 L388,256 L256,400 L124,256 Z"
        fill="none"
        stroke="#E8DCC8"
        stroke-width="2.0"
        stroke-linejoin="miter"
        opacity="0.85"/>

  <!-- G-letterform integration: a horizontal bar that enters
       the middle diamond from the right, creating a G-read
       when combined with the shield shape. Brutalist: one clean stroke. -->
  <line x1="322" y1="256" x2="272" y2="256"
        stroke="#E8DCC8"
        stroke-width="2.5"
        stroke-linecap="square"
        opacity="0.9"/>

  <!-- G crossbar vertical drop — subtle, forms the G stem -->
  <line x1="272" y1="256" x2="272" y2="290"
        stroke="#E8DCC8"
        stroke-width="2.0"
        stroke-linecap="square"
        opacity="0.7"/>

  <!-- ═══════════════════════════════════════════════
       LAYER 3: INNER DIAMOND — The core/kernel
       The recursive seed. Structure within structure
       within structure.
       ═══════════════════════════════════════════════ -->

  <!-- Inner diamond fill — slightly more opaque, the protected core -->
  <path d="M256,182 L326,256 L256,330 L186,256 Z"
        fill="#E8DCC8"
        fill-opacity="0.08"/>

  <path d="M256,182 L326,256 L256,330 L186,256 Z"
        fill="none"
        stroke="#E8DCC8"
        stroke-width="1.8"
        stroke-linejoin="miter"
        opacity="0.95"/>

  <!-- Central dot — the recursive terminus, the self watching the self -->
  <circle cx="256" cy="256" r="4"
          fill="#E8DCC8"
          opacity="0.9"/>

  <!-- Micro-dot ring around center — stipple detail -->
  <circle cx="256" cy="243" r="1" fill="#E8DCC8" opacity="0.35"/>
  <circle cx="269" cy="256" r="1" fill="#E8DCC8" opacity="0.35"/>
  <circle cx="256" cy="269" r="1" fill="#E8DCC8" opacity="0.35"/>
  <circle cx="243" cy="256" r="1" fill="#E8DCC8" opacity="0.35"/>

  <!-- ═══════════════════════════════════════════════
       TEXTURE LAYER: Ink stipple details
       Scattered dots along the diamond edges to create
       the hand-inked, luxe-print quality.
       ═══════════════════════════════════════════════ -->

  <!-- Stipple along outer diamond edges — top-right edge -->
  <circle cx="340" cy="162" r="1.2" fill="#E8DCC8" opacity="0.20"/>
  <circle cx="360" cy="178" r="0.8" fill="#E8DCC8" opacity="0.15"/>
  <circle cx="380" cy="198" r="1.0" fill="#E8DCC8" opacity="0.18"/>
  <circle cx="400" cy="218" r="0.7" fill="#E8DCC8" opacity="0.12"/>
  <circle cx="415" cy="238" r="1.1" fill="#E8DCC8" opacity="0.16"/>

  <!-- Stipple along outer diamond — bottom-right edge -->
  <circle cx="415" cy="278" r="0.9" fill="#E8DCC8" opacity="0.14"/>
  <circle cx="398" cy="300" r="1.0" fill="#E8DCC8" opacity="0.17"/>
  <circle cx="378" cy="322" r="0.7" fill="#E8DCC8" opacity="0.12"/>
  <circle cx="358" cy="342" r="1.2" fill="#E8DCC8" opacity="0.19"/>
  <circle cx="338" cy="360" r="0.8" fill="#E8DCC8" opacity="0.13"/>

  <!-- Stipple along outer diamond — bottom-left edge -->
  <circle cx="172" cy="162" r="0.9" fill="#E8DCC8" opacity="0.16"/>
  <circle cx="152" cy="182" r="1.1" fill="#E8DCC8" opacity="0.14"/>
  <circle cx="132" cy="202" r="0.7" fill="#E8DCC8" opacity="0.18"/>
  <circle cx="115" cy="228" r="1.0" fill="#E8DCC8" opacity="0.15"/>
  <circle cx="100" cy="244" r="0.8" fill="#E8DCC8" opacity="0.12"/>

  <!-- Stipple along outer diamond — top-left edge -->
  <circle cx="100" cy="270" r="1.0" fill="#E8DCC8" opacity="0.16"/>
  <circle cx="118" cy="296" r="0.8" fill="#E8DCC8" opacity="0.13"/>
  <circle cx="138" cy="318" r="1.1" fill="#E8DCC8" opacity="0.17"/>
  <circle cx="158" cy="338" r="0.7" fill="#E8DCC8" opacity="0.11"/>
  <circle cx="178" cy="356" r="0.9" fill="#E8DCC8" opacity="0.15"/>

  <!-- Stipple in the spaces between diamonds -->
  <circle cx="220" cy="140" r="0.6" fill="#E8DCC8" opacity="0.10"/>
  <circle cx="292" cy="140" r="0.7" fill="#E8DCC8" opacity="0.12"/>
  <circle cx="220" cy="372" r="0.7" fill="#E8DCC8" opacity="0.11"/>
  <circle cx="292" cy="372" r="0.6" fill="#E8DCC8" opacity="0.10"/>
  <circle cx="146" cy="220" r="0.5" fill="#E8DCC8" opacity="0.09"/>
  <circle cx="366" cy="220" r="0.6" fill="#E8DCC8" opacity="0.10"/>
  <circle cx="146" cy="292" r="0.6" fill="#E8DCC8" opacity="0.10"/>
  <circle cx="366" cy="292" r="0.5" fill="#E8DCC8" opacity="0.09"/>

  <!-- ═══════════════════════════════════════════════
       PERIMETER: Subtle containing circle
       The cosmic boundary, barely visible. Grounds the
       angular diamond forms with a hint of the infinite.
       ═══════════════════════════════════════════════ -->
  <circle cx="256" cy="256" r="240"
          fill="none"
          stroke="#E8DCC8"
          stroke-width="0.75"
          opacity="0.10"/>

  <!-- Second perimeter circle — tighter, slightly more visible -->
  <circle cx="256" cy="256" r="232"
          fill="none"
          stroke="#E8DCC8"
          stroke-width="0.5"
          opacity="0.06"
          stroke-dasharray="2,6"/>

</svg>